<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ff6f91">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Pesca il nostro sabato</title>

  <style>
    :root {
      --pink:#ff6f91;
      --pink-dark:#d63b66;
      --orange:#ffb067;
      --cream:#fffaf6;
      --text:#2c1b23;
      --muted:#765f68;
      --white:rgba(255,255,255,.92);
    }

    * {
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body {
      margin:0;
      min-height:100%;
      overflow-x:hidden;
    }

    body {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        max(22px, env(safe-area-inset-top))
        20px
        max(22px, env(safe-area-inset-bottom));
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.28), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,.20), transparent 22%),
        linear-gradient(145deg,var(--pink),var(--orange));
      position:relative;
    }

    body::before {
      content:"";
      position:fixed;
      inset:-25%;
      background:
        radial-gradient(circle, rgba(255,255,255,.12) 0 2px, transparent 3px);
      background-size:34px 34px;
      animation:drift 18s linear infinite;
      pointer-events:none;
    }

    @keyframes drift {
      from { transform:translate3d(0,0,0) rotate(0deg); }
      to { transform:translate3d(30px,-30px,0) rotate(4deg); }
    }

    .app {
      width:min(100%, 440px);
      position:relative;
      z-index:2;
    }

    .hero {
      text-align:center;
      color:white;
      margin-bottom:18px;
      animation:fadeDown .7s ease both;
    }

    .hero h1 {
      margin:0 0 8px;
      font-size:clamp(30px, 8vw, 38px);
      line-height:1.05;
      letter-spacing:-.03em;
      text-shadow:0 4px 18px rgba(70,20,40,.18);
    }

    .hero p {
      margin:0;
      font-size:15px;
      opacity:.95;
    }

    .game-card {
      position:relative;
      min-height:430px;
      padding:28px 24px 24px;
      background:rgba(255,250,246,.96);
      border:1px solid rgba(255,255,255,.6);
      border-radius:32px;
      box-shadow:
        0 24px 60px rgba(86,25,45,.28),
        inset 0 1px 0 rgba(255,255,255,.9);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      overflow:hidden;
      animation:cardIn .75s cubic-bezier(.2,.8,.2,1) both;
    }

    .game-card::after {
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      top:-90px;
      right:-80px;
      border-radius:50%;
      background:linear-gradient(135deg,rgba(255,111,145,.14),rgba(255,176,103,.16));
      pointer-events:none;
    }

    .top-row {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:22px;
    }

    .pill {
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:8px 12px;
      border-radius:999px;
      background:#ffe7ee;
      color:var(--pink-dark);
      font-size:12px;
      font-weight:850;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .counter {
      font-size:12px;
      color:#967985;
      font-weight:700;
    }

    .content {
      min-height:250px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;
      padding:8px 0 16px;
    }

    .emoji-wrap {
      width:92px;
      height:92px;
      margin:0 auto 18px;
      display:grid;
      place-items:center;
      border-radius:28px;
      background:linear-gradient(145deg,#fff,#ffe8ef);
      box-shadow:
        0 12px 28px rgba(214,59,102,.14),
        inset 0 1px 0 #fff;
      transform:rotate(-3deg);
      transition:transform .4s ease;
    }

    #emoji {
      font-size:52px;
      filter:drop-shadow(0 8px 10px rgba(80,20,40,.12));
    }

    h2 {
      margin:0 0 12px;
      font-size:clamp(28px,7vw,34px);
      line-height:1.08;
      letter-spacing:-.025em;
    }

    #desc {
      margin:0 auto;
      max-width:32ch;
      color:var(--muted);
      font-size:16px;
      line-height:1.55;
    }

    .draw-button {
      position:relative;
      width:100%;
      border:0;
      border-radius:20px;
      padding:19px 22px;
      overflow:hidden;
      cursor:pointer;
      background:linear-gradient(135deg,var(--pink-dark),#f15f7a);
      color:white;
      font-size:17px;
      font-weight:900;
      letter-spacing:.015em;
      box-shadow:
        0 13px 28px rgba(214,59,102,.34),
        inset 0 1px 0 rgba(255,255,255,.28);
      transition:
        transform .16s ease,
        box-shadow .16s ease,
        filter .16s ease;
    }

    .draw-button::before {
      content:"";
      position:absolute;
      top:-50%;
      left:-70%;
      width:50%;
      height:200%;
      transform:rotate(22deg);
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
      animation:shine 3.4s ease-in-out infinite;
    }

    .draw-button:active {
      transform:scale(.975);
      filter:brightness(.97);
      box-shadow:0 8px 18px rgba(214,59,102,.28);
    }

    .draw-button[disabled] {
      cursor:default;
      opacity:.88;
    }

    .hint {
      margin-top:15px;
      text-align:center;
      color:white;
      font-size:13px;
      opacity:.92;
      animation:fadeUp .9s .15s both;
    }

    .particle {
      position:fixed;
      z-index:10;
      pointer-events:none;
      animation:particleFly 1.25s cubic-bezier(.2,.75,.25,1) forwards;
    }

    .thinking .emoji-wrap {
      animation:wobble .55s ease-in-out infinite alternate;
    }

    .thinking #title,
    .thinking #desc {
      opacity:.35;
      filter:blur(1px);
      transform:scale(.985);
    }

    .reveal {
      animation:reveal .62s cubic-bezier(.16,.84,.24,1) both;
    }

    .reveal .emoji-wrap {
      animation:emojiPop .7s cubic-bezier(.2,1.25,.3,1) both;
    }

    .reveal h2 {
      animation:textUp .55s .08s both;
    }

    .reveal #desc {
      animation:textUp .55s .14s both;
    }

    @keyframes shine {
      0%,65% { left:-70%; }
      100% { left:130%; }
    }

    @keyframes wobble {
      from { transform:rotate(-7deg) scale(.98); }
      to { transform:rotate(7deg) scale(1.02); }
    }

    @keyframes reveal {
      0% { transform:scale(.985); }
      55% { transform:scale(1.012); }
      100% { transform:scale(1); }
    }

    @keyframes emojiPop {
      0% { transform:scale(.4) rotate(-20deg); opacity:0; }
      70% { transform:scale(1.12) rotate(4deg); opacity:1; }
      100% { transform:scale(1) rotate(-3deg); }
    }

    @keyframes textUp {
      from { opacity:0; transform:translateY(12px); }
      to { opacity:1; transform:translateY(0); }
    }

    @keyframes particleFly {
      0% {
        transform:translate3d(0,0,0) scale(.7) rotate(0deg);
        opacity:1;
      }
      100% {
        transform:translate3d(var(--x),var(--y),0) scale(1.3) rotate(120deg);
        opacity:0;
      }
    }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(22px) scale(.97); }
      to { opacity:1; transform:translateY(0) scale(1); }
    }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-12px); }
      to { opacity:1; transform:translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to { opacity:1; transform:translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *,*::before,*::after {
        animation-duration:.01ms !important;
        animation-iteration-count:1 !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="hero">
      <h1>Pesca il nostro sabato 💘</h1>
      <p>Un tap e il destino decide per noi.</p>
    </header>

    <section class="game-card" id="gameCard">
      <div class="top-row">
        <div class="pill">
          <span>✦</span>
          <span id="tag">Idea casuale</span>
        </div>
        <div class="counter" id="counter">Primo lancio</div>
      </div>

      <div class="content">
        <div class="emoji-wrap">
          <div id="emoji">🎲</div>
        </div>

        <h2 id="title">Pronta a pescare?</h2>
        <p id="desc">Tocca il pulsante e scopri cosa facciamo questo sabato.</p>
      </div>

      <button class="draw-button" id="drawButton" type="button">
        <span id="buttonText">TAP PER PESCARE</span>
      </button>
    </section>

    <div class="hint">
      Le ultime 5 proposte non possono uscire di nuovo ✨
    </div>
  </main>

  <script>
    const ideas = [{"title": "Bagno al tramonto + focaccia", "desc": "Latte, Balzi Rossi o Bordighera: ultimo bagno, focaccia e qualcosa da bere in spiaggia.", "emoji": "🌅", "tag": "Mare"}, {"title": "Mentone senza ristorante", "desc": "Passeggiata nella città vecchia, belvedere, lungomare e gelato.", "emoji": "🍦", "tag": "Mini gita"}, {"title": "Picnic a Cala del Forte", "desc": "Prendete qualcosa d’asporto, passeggiate sul porto e cenate vista mare.", "emoji": "🧺", "tag": "Relax"}, {"title": "Dolceacqua by night", "desc": "Esplorate il borgo, fate una passeggiata e finite con un drink.", "emoji": "🏘️", "tag": "Borgo"}, {"title": "Photo challenge di coppia", "desc": "Fate 10 foto a testa, scegliete la più bella e decretate il vincitore.", "emoji": "📸", "tag": "Gioco"}, {"title": "Passeggiata a Bordighera", "desc": "Gelato e camminata sul Lungomare Argentina, senza fretta.", "emoji": "🌊", "tag": "Passeggiata"}, {"title": "Aperitivo ai Balzi Rossi", "desc": "Drink, qualcosa da mangiare e tramonto sul mare.", "emoji": "🍹", "tag": "Aperitivo"}, {"title": "Cena a Mentone", "desc": "Scegliete una cucina diversa dal solito e poi passeggiata nella città vecchia.", "emoji": "🍽️", "tag": "Cena"}, {"title": "Cinema + cena spazzatura", "desc": "Film, hamburger o pizza e dessert. Perfetto quando siete stanchi.", "emoji": "🎬", "tag": "Easy"}, {"title": "Tour dei cocktail", "desc": "Tre locali, un drink da dividere in ogni posto e voto finale.", "emoji": "🍸", "tag": "Serata"}, {"title": "Picnic premium", "desc": "Sushi, poke o prodotti francesi in un punto panoramico.", "emoji": "✨", "tag": "Picnic"}, {"title": "Serata evento estivo", "desc": "Sagra, concerto, mercatino o festa di paese tra costa ed entroterra.", "emoji": "🎶", "tag": "Evento"}, {"title": "Cena romantica nell’entroterra", "desc": "Apricale, Dolceacqua o Rocchetta Nervina: scegliete un posto speciale.", "emoji": "💘", "tag": "Romantico"}, {"title": "E-bike + cena", "desc": "Giro panoramico nel tardo pomeriggio e cena dopo l’attività.", "emoji": "🚲", "tag": "Attività"}, {"title": "Escape room + cena", "desc": "Una sfida da fare insieme e poi cena dove vi ispira.", "emoji": "🗝️", "tag": "Sfida"}, {"title": "Serata da turisti", "desc": "Degustazione, visita guidata, barca al tramonto o tour gastronomico.", "emoji": "🛥️", "tag": "Esperienza"}, {"title": "Sabato misterioso", "desc": "Uno organizza tutto. L’altro sa solo come vestirsi e a che ora partire.", "emoji": "🎁", "tag": "Sorpresa"}, {"title": "Cena improvvisata in spiaggia", "desc": "Passate a prendere qualcosa di buono e scegliete la spiaggia sul momento.", "emoji": "🏖️", "tag": "Improvvisato"}, {"title": "Passeggiata a Ventimiglia Alta", "desc": "Centro storico, scorci panoramici e tappa finale per bere qualcosa.", "emoji": "🌙", "tag": "Vicino"}, {"title": "Tramonto a Capo Mortola", "desc": "Passeggiata panoramica, foto insieme e sosta tranquilla sul mare.", "emoji": "🌄", "tag": "Panorama"}];
    const recentHistory = [];
    const HISTORY_LIMIT = 5;

    let drawCount = 0;
    let isDrawing = false;

    const card = document.getElementById('gameCard');
    const button = document.getElementById('drawButton');
    const buttonText = document.getElementById('buttonText');
    const emoji = document.getElementById('emoji');
    const title = document.getElementById('title');
    const desc = document.getElementById('desc');
    const tag = document.getElementById('tag');
    const counter = document.getElementById('counter');

    function chooseIdea() {
      const blocked = new Set(recentHistory);
      let available = ideas
        .map((idea, index) => ({ idea, index }))
        .filter(item => !blocked.has(item.index));

      if (available.length === 0) {
        recentHistory.length = 0;
        available = ideas.map((idea, index) => ({ idea, index }));
      }

      const chosen = available[Math.floor(Math.random() * available.length)];

      recentHistory.push(chosen.index);
      if (recentHistory.length > HISTORY_LIMIT) recentHistory.shift();

      return chosen.idea;
    }

    function createParticles() {
      const icons = ['💗','✨','💘','⭐','💕','✦'];
      const rect = button.getBoundingClientRect();
      const startX = rect.left + rect.width / 2;
      const startY = rect.top + rect.height / 2;

      for (let i = 0; i < 14; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        p.textContent = icons[Math.floor(Math.random() * icons.length)];
        p.style.left = startX + 'px';
        p.style.top = startY + 'px';
        p.style.fontSize = (14 + Math.random() * 12) + 'px';

        const angle = (Math.PI * 2 * i / 14) + (Math.random() * .35);
        const distance = 90 + Math.random() * 100;
        p.style.setProperty('--x', Math.cos(angle) * distance + 'px');
        p.style.setProperty('--y', Math.sin(angle) * distance - 35 + 'px');

        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1300);
      }
    }

    function drawIdea() {
      if (isDrawing) return;

      isDrawing = true;
      drawCount++;
      button.disabled = true;
      buttonText.textContent = 'STO PESCANDO...';

      card.classList.remove('reveal');
      card.classList.add('thinking');

      const rolling = setInterval(() => {
        const temp = ideas[Math.floor(Math.random() * ideas.length)];
        emoji.textContent = temp.emoji;
      }, 90);

      setTimeout(() => {
        clearInterval(rolling);

        const chosen = chooseIdea();

        emoji.textContent = chosen.emoji;
        title.textContent = chosen.title;
        desc.textContent = chosen.desc;
        tag.textContent = chosen.tag;
        counter.textContent = drawCount === 1 ? '1 pesca' : drawCount + ' pescate';

        card.classList.remove('thinking');
        void card.offsetWidth;
        card.classList.add('reveal');

        createParticles();

        if (navigator.vibrate) navigator.vibrate([20, 30, 20]);

        buttonText.textContent = 'PESCA DI NUOVO';
        button.disabled = false;
        isDrawing = false;
      }, 850);
    }

    button.addEventListener('click', drawIdea);
  </script>
</body>
</html>
