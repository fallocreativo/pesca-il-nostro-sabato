<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#ff6f91"><title>Pesca il nostro sabato</title><style>
:root{--pink:#ff6f91;--pink2:#f15f7a;--orange:#ffb067;--cream:#fffaf6;--text:#2d1b23;--muted:#7a626c}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px 18px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 20% 15%,rgba(255,255,255,.28),transparent 30%),linear-gradient(145deg,var(--pink),var(--orange));overflow-x:hidden}.app{width:min(100%,440px);position:relative;z-index:2}.hero{text-align:center;color:white;margin-bottom:16px}.hero h1{margin:0 0 8px;font-size:34px;line-height:1.05;letter-spacing:-.03em}.hero p{margin:0;opacity:.95}.card{position:relative;background:rgba(255,250,246,.97);border-radius:32px;padding:24px;box-shadow:0 24px 60px rgba(86,25,45,.28);overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px}.badge,.duration{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:800}.badge{background:#ffe7ee;color:#d63b66;text-transform:uppercase;letter-spacing:.04em}.duration{background:#fff0d8;color:#9a5d14}.sound-btn{border:0;background:#fff;border-radius:14px;width:42px;height:42px;font-size:19px;box-shadow:0 8px 20px rgba(0,0,0,.08);cursor:pointer}.content{min-height:265px;display:flex;flex-direction:column;justify-content:center;text-align:center}.emoji-wrap{width:96px;height:96px;margin:0 auto 18px;display:grid;place-items:center;border-radius:30px;background:linear-gradient(145deg,#fff,#ffe8ef);box-shadow:0 12px 28px rgba(214,59,102,.14)}#emoji{font-size:54px}h2{margin:0 0 12px;font-size:31px;line-height:1.08;letter-spacing:-.025em}#desc{margin:0 auto;color:var(--muted);font-size:16px;line-height:1.55;max-width:32ch}button.draw{width:100%;border:0;border-radius:20px;padding:19px 22px;background:linear-gradient(135deg,#d63b66,var(--pink2));color:white;font-size:17px;font-weight:900;box-shadow:0 13px 28px rgba(214,59,102,.34);cursor:pointer;position:relative;overflow:hidden}button.draw::before{content:"";position:absolute;top:-50%;left:-70%;width:50%;height:200%;transform:rotate(22deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);animation:shine 3.4s ease-in-out infinite}.hint{margin-top:14px;color:white;text-align:center;font-size:13px;opacity:.95}.thinking .emoji-wrap{animation:wobble .5s ease-in-out infinite alternate}.thinking h2,.thinking #desc{opacity:.35;filter:blur(1px)}.reveal{animation:reveal .55s ease}.particle{position:fixed;pointer-events:none;z-index:10;animation:fly 1.2s ease-out forwards}@keyframes shine{0%,65%{left:-70%}100%{left:130%}}@keyframes wobble{from{transform:rotate(-7deg) scale(.98)}to{transform:rotate(7deg) scale(1.03)}}@keyframes reveal{0%{transform:scale(.985)}60%{transform:scale(1.015)}100%{transform:scale(1)}}@keyframes fly{to{transform:translate(var(--x),var(--y)) rotate(120deg);opacity:0}}@media(max-width:380px){.top{flex-wrap:wrap}.duration{order:3}}
</style></head><body><main class="app"><header class="hero"><h1>Pesca il nostro sabato 💘</h1><p>Un tap e il destino decide per noi.</p></header><section class="card" id="card"><div class="top"><span class="badge" id="tag">Idea casuale</span><span class="duration" id="duration">Scegliamo insieme</span><button class="sound-btn" id="soundBtn" aria-label="Attiva o disattiva i suoni">🔊</button></div><div class="content"><div class="emoji-wrap"><div id="emoji">🎲</div></div><h2 id="title">Pronta a pescare?</h2><p id="desc">Tocca il pulsante e scopri cosa facciamo questo sabato.</p></div><button class="draw" id="drawBtn"><span id="buttonText">TAP PER PESCARE</span></button></section><div class="hint">Le ultime 6 idee non possono uscire di nuovo ✨</div></main><script>
const ideas = [{"title": "Cena a Mentone", "desc": "Cena e passeggiata sul lungomare prima di tornare.", "emoji": "🍽️", "tag": "Mentone", "duration": "Serata tranquilla"}, {"title": "Aperitivo a Mentone", "desc": "Qualcosa da bere e da mangiare, breve passeggiata e rientro.", "emoji": "🍹", "tag": "Mentone", "duration": "Serata breve"}, {"title": "Gelato e passeggiata a Mentone", "desc": "Giro nella città vecchia, gelato e ritorno senza fare tardi.", "emoji": "🍦", "tag": "Mentone", "duration": "Serata breve"}, {"title": "Cena veloce a Mentone", "desc": "Scegliete un posto semplice, mangiate e fate due passi.", "emoji": "🥗", "tag": "Mentone", "duration": "Serata breve"}, {"title": "Tramonto a Mentone", "desc": "Passeggiata sul mare al tramonto e qualcosa da mangiare.", "emoji": "🌅", "tag": "Mentone", "duration": "Serata tranquilla"}, {"title": "Cena a Dolceacqua", "desc": "Giro nel borgo, cena e ritorno.", "emoji": "🏘️", "tag": "Entroterra", "duration": "Serata tranquilla"}, {"title": "Aperitivo a Dolceacqua", "desc": "Passeggiata, aperitivo e serata tranquilla.", "emoji": "🍷", "tag": "Entroterra", "duration": "Serata breve"}, {"title": "Cena ad Apricale", "desc": "Cena nel borgo e breve passeggiata.", "emoji": "🌙", "tag": "Entroterra", "duration": "Serata completa"}, {"title": "Cena a Rocchetta Nervina", "desc": "Serata tranquilla nell’entroterra e ritorno dopo cena.", "emoji": "🍝", "tag": "Entroterra", "duration": "Serata tranquilla"}, {"title": "Pizza nell’entroterra", "desc": "Scegliete un borgo, pizza e passeggiata.", "emoji": "🍕", "tag": "Entroterra", "duration": "Serata tranquilla"}, {"title": "Aperitivo ai Balzi Rossi", "desc": "Tramonto, qualcosa da bere e mangiare e poi rientro.", "emoji": "🌊", "tag": "Tramonto", "duration": "Serata breve"}, {"title": "Tramonto + pizza", "desc": "Guardate il tramonto e poi andate a mangiare una pizza.", "emoji": "🌇", "tag": "Tramonto", "duration": "Serata tranquilla"}, {"title": "Tramonto + gelato", "desc": "Scegliete un punto panoramico, guardate il tramonto e finite con un gelato.", "emoji": "🍨", "tag": "Tramonto", "duration": "Serata breve"}, {"title": "Cena a Bordighera", "desc": "Cena e passeggiata sul Lungomare Argentina.", "emoji": "🌴", "tag": "Passeggiata", "duration": "Serata tranquilla"}, {"title": "Aperitivo a Bordighera", "desc": "Aperitivo, passeggiata sul mare e ritorno.", "emoji": "🥂", "tag": "Aperitivo", "duration": "Serata breve"}, {"title": "Cena a Bordighera Alta", "desc": "Cena nel centro storico e breve passeggiata.", "emoji": "🏛️", "tag": "Passeggiata", "duration": "Serata completa"}, {"title": "Pizza + passeggiata sul mare", "desc": "La serata semplice quando volete uscire senza fare tardi.", "emoji": "🍕", "tag": "Passeggiata", "duration": "Serata breve"}, {"title": "Cena vicino casa", "desc": "Scegliete un ristorante tra Ventimiglia, Vallecrosia e Bordighera e tornate presto.", "emoji": "🏡", "tag": "Cena", "duration": "Serata breve"}, {"title": "Cena d’asporto al tramonto", "desc": "Prendete pizza, sushi o altro e mangiate vista mare.", "emoji": "🥡", "tag": "Tramonto", "duration": "Serata breve"}, {"title": "Focaccia + passeggiata", "desc": "Cena semplice e giro sul lungomare.", "emoji": "🥖", "tag": "Passeggiata", "duration": "Serata breve"}, {"title": "Gelato + passeggiata sul mare", "desc": "Un’uscita breve per stare insieme senza organizzare una vera serata.", "emoji": "🍦", "tag": "Passeggiata", "duration": "Serata breve"}, {"title": "Aperitivo che vale come cena", "desc": "Tagliere, drink e passeggiata prima di tornare.", "emoji": "🧀", "tag": "Aperitivo", "duration": "Serata tranquilla"}, {"title": "Pizza a Mentone", "desc": "Pizza, giro sul lungomare e rientro.", "emoji": "🍕", "tag": "Mentone", "duration": "Serata tranquilla"}, {"title": "Cena scelta sul momento", "desc": "Partite verso Mentone, Bordighera o l’entroterra e scegliete dove mangiare una volta arrivati.", "emoji": "🎲", "tag": "Cena", "duration": "Serata completa"}, {"title": "Borgo + gelato", "desc": "Passeggiata a Dolceacqua o Apricale e qualcosa di dolce prima di tornare.", "emoji": "🏘️", "tag": "Entroterra", "duration": "Serata breve"}, {"title": "Tramonto a Capo Mortola", "desc": "Tramonto, breve passeggiata e cena vicino casa.", "emoji": "🌄", "tag": "Tramonto", "duration": "Serata tranquilla"}, {"title": "Passeggiata a Ventimiglia Alta", "desc": "Giro nel centro storico e qualcosa da mangiare.", "emoji": "🏰", "tag": "Passeggiata", "duration": "Serata breve"}, {"title": "Cena + gelato", "desc": "Scegliete dove cenare e terminate la serata con un gelato.", "emoji": "🍽️", "tag": "Cena", "duration": "Serata tranquilla"}, {"title": "Aperitivo + pizza", "desc": "Aperitivo leggero, pizza e ritorno.", "emoji": "🍹", "tag": "Aperitivo", "duration": "Serata completa"}, {"title": "Sabato tranquillo", "desc": "Cena semplice, passeggiata e a casa presto.", "emoji": "💛", "tag": "Easy", "duration": "Serata breve"}]; const history=[]; const HISTORY_LIMIT=6; let drawing=false,soundOn=true,audioCtx; const card=document.getElementById('card'),emoji=document.getElementById('emoji'),title=document.getElementById('title'),desc=document.getElementById('desc'),tag=document.getElementById('tag'),duration=document.getElementById('duration'),drawBtn=document.getElementById('drawBtn'),buttonText=document.getElementById('buttonText'),soundBtn=document.getElementById('soundBtn'); function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx} function tone(freq,start,length,type='sine',volume=.05){if(!soundOn)return;const ctx=getAudio(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime+start);gain.gain.setValueAtTime(.0001,ctx.currentTime+start);gain.gain.exponentialRampToValueAtTime(volume,ctx.currentTime+start+.01);gain.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+start+length);osc.connect(gain);gain.connect(ctx.destination);osc.start(ctx.currentTime+start);osc.stop(ctx.currentTime+start+length+.02)} function playDrawSound(){tone(320,0,.08,'triangle',.035);tone(390,.10,.08,'triangle',.035);tone(470,.20,.10,'triangle',.035)} function playRevealSound(){tone(523,0,.14,'sine',.05);tone(659,.11,.14,'sine',.045);tone(784,.22,.24,'sine',.04)} function chooseIdea(){const blocked=new Set(history),available=ideas.map((idea,index)=>({idea,index})).filter(x=>!blocked.has(x.index)),pool=available.length?available:ideas.map((idea,index)=>({idea,index})),chosen=pool[Math.floor(Math.random()*pool.length)];history.push(chosen.index);if(history.length>HISTORY_LIMIT)history.shift();return chosen.idea} function particles(){const icons=['💗','✨','⭐','💕'],rect=drawBtn.getBoundingClientRect(),sx=rect.left+rect.width/2,sy=rect.top+rect.height/2;for(let i=0;i<12;i++){const p=document.createElement('span');p.className='particle';p.textContent=icons[Math.floor(Math.random()*icons.length)];p.style.left=sx+'px';p.style.top=sy+'px';const a=Math.PI*2*i/12+Math.random()*.25,d=80+Math.random()*90;p.style.setProperty('--x',Math.cos(a)*d+'px');p.style.setProperty('--y',Math.sin(a)*d-35+'px');document.body.appendChild(p);setTimeout(()=>p.remove(),1250)}} async function draw(){if(drawing)return;drawing=true;drawBtn.disabled=true;buttonText.textContent='STO PESCANDO...';card.classList.remove('reveal');card.classList.add('thinking');try{if(soundOn)await getAudio().resume()}catch(e){}playDrawSound();const roll=setInterval(()=>{const tmp=ideas[Math.floor(Math.random()*ideas.length)];emoji.textContent=tmp.emoji},85);setTimeout(()=>{clearInterval(roll);const x=chooseIdea();emoji.textContent=x.emoji;title.textContent=x.title;desc.textContent=x.desc;tag.textContent=x.tag;duration.textContent=x.duration;card.classList.remove('thinking');void card.offsetWidth;card.classList.add('reveal');particles();playRevealSound();if(navigator.vibrate)navigator.vibrate([18,28,18]);buttonText.textContent='PESCA DI NUOVO';drawBtn.disabled=false;drawing=false},850)} soundBtn.addEventListener('click',async()=>{soundOn=!soundOn;soundBtn.textContent=soundOn?'🔊':'🔇';if(soundOn){try{await getAudio().resume()}catch(e){}tone(660,0,.12,'sine',.035)}});drawBtn.addEventListener('click',draw);
</script></body></html>
