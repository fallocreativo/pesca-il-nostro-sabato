<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ff758c">
  <title>Pesca il nostro sabato</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:22px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:linear-gradient(145deg,#ff758c,#ffb26b);color:#2d1b1f
    }
    .wrap{width:100%;max-width:430px}
    .head{color:#fff;text-align:center;margin-bottom:16px}
    .head h1{margin:0 0 8px;font-size:32px}
    .head p{margin:0;opacity:.95}
    .card{
      background:#fffaf6;border-radius:28px;padding:30px 22px;text-align:center;
      box-shadow:0 18px 45px rgba(80,20,35,.28)
    }
    #emoji{font-size:54px;margin-bottom:8px}
    .badge{
      display:inline-block;background:#ffe3eb;color:#c9365f;padding:7px 12px;
      border-radius:999px;font-size:12px;font-weight:800;margin-bottom:18px
    }
    h2{font-size:28px;line-height:1.15;margin:0 0 12px}
    #desc{color:#735b61;line-height:1.5;margin:0 auto 24px;max-width:31ch}
    button{
      width:100%;border:0;border-radius:18px;padding:18px;
      background:linear-gradient(135deg,#c9365f,#ef6075);
      color:white;font-size:17px;font-weight:900;
      box-shadow:0 10px 22px rgba(201,54,95,.3);cursor:pointer
    }
    button:active{transform:scale(.98)}
    .note{color:#fff;text-align:center;font-size:13px;margin-top:14px;opacity:.95}
    .flash{animation:flash .35s ease}
    @keyframes flash{50%{transform:scale(.96);opacity:.55}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>Pesca il nostro sabato 💘</h1>
      <p>Un tap e decide il destino.</p>
    </div>

    <div class="card" id="card">
      <div id="emoji">🎲</div>
      <div class="badge">IDEA CASUALE</div>
      <h2 id="title">Pronta a pescare?</h2>
      <p id="desc">Tocca il pulsante e scopri cosa facciamo questo sabato.</p>
      <button type="button" id="drawBtn">TAP PER PESCARE</button>
    </div>

    <div class="note">Puoi pescare più volte… oppure accettare la prima 😏</div>
  </div>

  <script>
    const idee = [["Bagno al tramonto + focaccia", "Latte, Balzi Rossi o Bordighera: ultimo bagno, focaccia e qualcosa da bere in spiaggia.", "🌅"], ["Mentone senza ristorante", "Passeggiata nella città vecchia, belvedere, lungomare e gelato.", "🍦"], ["Picnic a Cala del Forte", "Prendete qualcosa d’asporto, passeggiate sul porto e cenate vista mare.", "🧺"], ["Dolceacqua by night", "Esplorate il borgo e finite con un drink.", "🏘️"], ["Photo challenge di coppia", "Fate 10 foto a testa e votate la migliore.", "📸"], ["Passeggiata a Bordighera", "Gelato e camminata sul Lungomare Argentina.", "🌊"], ["Aperitivo ai Balzi Rossi", "Drink e qualcosa da mangiare vista tramonto.", "🍹"], ["Cena a Mentone", "Scegliete una cucina diversa e poi passeggiata nella città vecchia.", "🍽️"], ["Cinema + cena spazzatura", "Film, hamburger o pizza e dessert.", "🎬"], ["Tour dei cocktail", "Tre locali, un drink da dividere e voto finale.", "🍸"], ["Picnic premium", "Sushi, poke o prodotti francesi in un punto panoramico.", "✨"], ["Serata evento estivo", "Sagra, concerto, mercatino o festa di paese.", "🎶"], ["Cena romantica nell’entroterra", "Apricale, Dolceacqua o Rocchetta Nervina.", "💘"], ["E-bike + cena", "Giro panoramico nel tardo pomeriggio e cena.", "🚲"], ["Escape room + cena", "Un’attività da fare insieme e poi cena.", "🗝️"], ["Serata da turisti", "Degustazione, visita guidata o barca al tramonto.", "🛥️"], ["Sabato misterioso", "Uno organizza tutto, l’altro sa solo come vestirsi.", "🎁"]];
    let ultimo = -1;

    function pesca() {
      let i;
      do {
        i = Math.floor(Math.random() * idee.length);
      } while (i === ultimo && idee.length > 1);

      ultimo = i;
      const scelta = idee[i];

      document.getElementById('emoji').textContent = scelta[2];
      document.getElementById('title').textContent = scelta[0];
      document.getElementById('desc').textContent = scelta[1];

      const card = document.getElementById('card');
      card.classList.remove('flash');
      void card.offsetWidth;
      card.classList.add('flash');
    }

    document.getElementById('drawBtn').addEventListener('click', pesca);
  </script>
</body>
</html>
